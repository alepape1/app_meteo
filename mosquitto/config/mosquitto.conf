# mosquitto.conf — Aquantia MQTT broker
# Imagen requerida: iegomez/mosquitto-go-auth (incluye el plugin go-auth)
# Ver docker-compose.yml

# ── Listener interno Docker (sin TLS, solo red interna) ───────────────────────
listener 1883
protocol mqtt

# ── Listener externo TLS para ESP32 ───────────────────────────────────────────
# Reemplaza "tu-dominio.com" con tu dominio real (debe coincidir con el cert)
listener 8883
protocol mqtt
cafile   /etc/letsencrypt/live/tu-dominio.com/chain.pem
certfile /etc/letsencrypt/live/tu-dominio.com/cert.pem
keyfile  /etc/letsencrypt/live/tu-dominio.com/privkey.pem
tls_version tlsv1.2

# ── Autenticación via go-auth (HTTP webhook al backend Flask) ─────────────────
auth_plugin /go-auth.so

auth_opt_backends http

auth_opt_http_host     backend
auth_opt_http_port     7000
auth_opt_http_getuser_uri  /api/mqtt/auth
auth_opt_http_aclcheck_uri /api/mqtt/acl
auth_opt_http_method   POST
auth_opt_http_params_mode  json

# Sin caché (Redis), validación en cada conexión. Para añadir Redis:
# auth_opt_cache true
# auth_opt_cache_host redis
# auth_opt_cache_port 6379
# auth_opt_cache_seconds 300

# ── Persistencia y logging ────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

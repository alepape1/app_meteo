# mosquitto.dev.conf — Configuración local sin TLS
# Usa la imagen estándar eclipse-mosquitto (sin go-auth)
# Autenticación desactivada para desarrollo local

# Listener MQTT sin cifrado
listener 1883
protocol mqtt

# Permitir conexiones sin usuario/contraseña en local
allow_anonymous true

# Persistencia de mensajes
persistence true
persistence_location /mosquitto/data/

# Log en stdout para ver en docker compose logs
log_dest stdout
log_type all

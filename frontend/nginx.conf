# nginx.conf — Aquantia frontend
# Sirve el SPA React y hace proxy de /api y /ws al backend Flask

# Redirigir HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # Certificados Let's Encrypt (montados desde el host en docker-compose.yml)
    # Reemplaza "tu-dominio.com" con tu dominio real
    ssl_certificate     /etc/letsencrypt/live/tu-dominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tu-dominio.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── SPA React ─────────────────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    # Todas las rutas del SPA van a index.html (react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API → backend Flask ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:7000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── WebSocket /ws → backend Flask (Server-Sent Events / WS) ──────────────
    location /ws {
        proxy_pass         http://backend:7000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # ── Activos estáticos: caché larga ────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# nginx.conf — Aquantia frontend (HTTP interno)
# TLS y redirección HTTP→HTTPS los gestiona el nginx de HestiaCP en el host.

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # SPA React: todas las rutas van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API → backend Flask (red Docker interna)
    location /api/ {
        proxy_pass         http://backend:7000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket / Server-Sent Events
    location /ws {
        proxy_pass         http://backend:7000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # Caché larga para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
